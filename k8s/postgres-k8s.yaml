apiVersion: v1
kind: Namespace
metadata:
  name: vidalcasino
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: vidalcasino
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS usuarios (
      id              SERIAL PRIMARY KEY,
      username        VARCHAR(40)  NOT NULL UNIQUE,
      email           VARCHAR(120) NOT NULL UNIQUE,
      password_hash   VARCHAR(255) NOT NULL,
      saldo           NUMERIC(12, 2) NOT NULL DEFAULT 1000.00,
      rol             VARCHAR(20)  NOT NULL DEFAULT 'jugador',
      creado_en       TIMESTAMP    NOT NULL DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS juegos (
      id          SERIAL PRIMARY KEY,
      codigo      VARCHAR(30)  NOT NULL UNIQUE,
      nombre      VARCHAR(60)  NOT NULL,
      descripcion TEXT,
      apuesta_min NUMERIC(10,2) NOT NULL DEFAULT 10,
      apuesta_max NUMERIC(10,2) NOT NULL DEFAULT 1000,
      activo      BOOLEAN      NOT NULL DEFAULT TRUE
    );

    CREATE TABLE IF NOT EXISTS transacciones (
      id          SERIAL PRIMARY KEY,
      usuario_id  INTEGER      NOT NULL REFERENCES usuarios(id) ON DELETE CASCADE,
      tipo        VARCHAR(20)  NOT NULL CHECK (tipo IN ('apuesta','premio','deposito','retiro','ajuste')),
      juego_id    INTEGER      REFERENCES juegos(id),
      monto       NUMERIC(12,2) NOT NULL,
      saldo_post  NUMERIC(12,2) NOT NULL,
      detalle     JSONB,
      creada_en   TIMESTAMP    NOT NULL DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_tx_usuario ON transacciones(usuario_id, creada_en DESC);
    CREATE INDEX IF NOT EXISTS idx_tx_juego   ON transacciones(juego_id);

    CREATE TABLE IF NOT EXISTS sesiones_juego (
      id          SERIAL PRIMARY KEY,
      usuario_id  INTEGER      NOT NULL REFERENCES usuarios(id) ON DELETE CASCADE,
      juego_id    INTEGER      NOT NULL REFERENCES juegos(id),
      estado      JSONB        NOT NULL,
      abierta     BOOLEAN      NOT NULL DEFAULT TRUE,
      creada_en   TIMESTAMP    NOT NULL DEFAULT NOW(),
      cerrada_en  TIMESTAMP
    );

    INSERT INTO juegos (codigo, nombre, descripcion, apuesta_min, apuesta_max) VALUES
      ('slots',     'Tragamonedas', 'Maquina de 3 rodillos con 8 simbolos.',             10, 500),
      ('roulette',  'Ruleta',       'Ruleta europea: numero, color, par/impar, docena.', 10, 1000),
      ('blackjack', 'Blackjack',    'Cartas contra la banca. Hit, stand, doble.',        20, 2000)
    ON CONFLICT (codigo) DO NOTHING;

    CREATE TABLE IF NOT EXISTS bonos (
      id           SERIAL PRIMARY KEY,
      codigo       VARCHAR(40)   NOT NULL UNIQUE,
      nombre       VARCHAR(80)   NOT NULL,
      descripcion  TEXT,
      tipo         VARCHAR(20)   NOT NULL CHECK (tipo IN ('monto_fijo','porcentaje')),
      valor        NUMERIC(12,2) NOT NULL,
      un_solo_uso  BOOLEAN       NOT NULL DEFAULT TRUE,
      activo       BOOLEAN       NOT NULL DEFAULT TRUE,
      creado_en    TIMESTAMP     NOT NULL DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS bonos_reclamados (
      id              SERIAL PRIMARY KEY,
      usuario_id      INTEGER       NOT NULL REFERENCES usuarios(id) ON DELETE CASCADE,
      bono_id         INTEGER       NOT NULL REFERENCES bonos(id),
      monto_otorgado  NUMERIC(12,2) NOT NULL,
      reclamado_en    TIMESTAMP     NOT NULL DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_bonos_recl_usuario ON bonos_reclamados(usuario_id);

    CREATE TABLE IF NOT EXISTS eventos_deportivos (
      id            SERIAL PRIMARY KEY,
      deporte       VARCHAR(40)  NOT NULL,
      equipo_local  VARCHAR(80)  NOT NULL,
      equipo_visita VARCHAR(80)  NOT NULL,
      liga          VARCHAR(80),
      badge_local   TEXT,
      badge_visita  TEXT,
      inicio        TIMESTAMP,
      cuota_local   NUMERIC(6,2) NOT NULL,
      cuota_empate  NUMERIC(6,2) NOT NULL,
      cuota_visita  NUMERIC(6,2) NOT NULL,
      estado        VARCHAR(20)  NOT NULL DEFAULT 'abierto'
                    CHECK (estado IN ('abierto','cerrado','finalizado')),
      resultado     VARCHAR(10)  CHECK (resultado IN ('local','empate','visita')),
      goles_local   INTEGER,
      goles_visita  INTEGER,
      minutos_gol   JSONB,
      creado_en     TIMESTAMP    NOT NULL DEFAULT NOW()
    );

    CREATE UNIQUE INDEX IF NOT EXISTS uq_evento_partido
      ON eventos_deportivos (deporte, equipo_local, equipo_visita);

    CREATE TABLE IF NOT EXISTS apuestas (
      id                  SERIAL PRIMARY KEY,
      usuario_id          INTEGER       NOT NULL REFERENCES usuarios(id) ON DELETE CASCADE,
      evento_id           INTEGER       NOT NULL REFERENCES eventos_deportivos(id),
      seleccion           VARCHAR(10)   NOT NULL CHECK (seleccion IN ('local','empate','visita')),
      monto               NUMERIC(12,2) NOT NULL,
      cuota               NUMERIC(6,2)  NOT NULL,
      ganancia_potencial  NUMERIC(12,2) NOT NULL,
      estado              VARCHAR(10)   NOT NULL DEFAULT 'pendiente'
                          CHECK (estado IN ('pendiente','ganada','perdida')),
      creada_en           TIMESTAMP     NOT NULL DEFAULT NOW(),
      resuelta_en         TIMESTAMP
    );

    CREATE INDEX IF NOT EXISTS idx_apuestas_usuario ON apuestas(usuario_id, creada_en DESC);
    CREATE INDEX IF NOT EXISTS idx_apuestas_evento  ON apuestas(evento_id);
---
apiVersion: v1
kind: Secret
metadata:
  name: casino-secrets
  namespace: vidalcasino
type: Opaque
data:
  DB_NAME: Y2FzaW5vX2Ri
  DB_USER: Y2FzaW5v
  DB_PASSWORD: Y2FzaW5v
  JWT_SECRET: Y2FtYmlhbWU=
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-db
  namespace: vidalcasino
  labels:
    app: postgres-db
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres-db
  template:
    metadata:
      labels:
        app: postgres-db
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: casino-secrets
              key: DB_NAME
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: casino-secrets
              key: DB_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: casino-secrets
              key: DB_PASSWORD
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
        volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data
        - name: initdb
          mountPath: /docker-entrypoint-initdb.d
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - casino
            - -d
            - casino_db
          initialDelaySeconds: 20
          periodSeconds: 5
          failureThreshold: 6
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - casino
            - -d
            - casino_db
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 5
      volumes:
      - name: pgdata
        emptyDir: {}
      - name: initdb
        configMap:
          name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: vidalcasino
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: postgres-db
